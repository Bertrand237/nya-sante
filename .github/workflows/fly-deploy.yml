# ═══════════════════════════════════════════════════════
# NYA Santé - Auto-Deploy to Fly.io on push to main
# ═══════════════════════════════════════════════════════
# Déploiement automatique vers Fly.io à chaque push sur main
# Le code est d'abord poussé sur GitHub, puis Fly.io build & deploy
# ═══════════════════════════════════════════════════════

name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  # Permet de déclencher manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy NYA Santé
    runs-on: ubuntu-latest
    # Ne pas déployer les commits de dependabot automatiquement
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}